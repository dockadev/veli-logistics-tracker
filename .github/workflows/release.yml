name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-latest"
            args: "--bundles appimage"
          - platform: "windows-latest"
            args: "--no-bundle"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev squashfs-tools

      - name: Install dependencies
        run: npm ci

      - name: Build frontend & compile Tauri binaries
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Prepare Windows standalone binary
        if: matrix.platform == 'windows-latest'
        run: |
          Copy-Item -Path "src-tauri/target/release/app.exe" -Destination "src-tauri/target/release/Veli_Logistics_Tracker.exe" -Force
        shell: pwsh

      - name: Prepare Linux AppImage binary
        if: matrix.platform == 'ubuntu-latest'
        run: |
          cp src-tauri/target/release/bundle/appimage/*.AppImage src-tauri/target/release/Veli_Logistics_Tracker.AppImage

      - name: Upload portable release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            src-tauri/target/release/Veli_Logistics_Tracker.exe
            src-tauri/target/release/Veli_Logistics_Tracker.AppImage
          tag_name: ${{ github.ref_name }}
          name: "Veli Logistics Tracker ${{ github.ref_name }}"
          body: "Pre-release portable builds of Veli Logistics Tracker. No installation required."
          draft: true
          prerelease: true
          fail_on_unmatched_files: false
